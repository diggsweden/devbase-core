name: Test Unit Fedora
on: # yamllint disable-line rule:truthy
  pull_request:
    paths:
      - 'libs/**'
      - 'tests/**'
      - 'setup.sh'
      - 'dot/.config/devbase/packages.yaml'
      - '.github/workflows/test-unit-fedora.yml'
  push:
    branches:
      - main
    paths:
      - 'libs/**'
      - 'tests/**'
      - 'setup.sh'
      - 'dot/.config/devbase/packages.yaml'
      - '.github/workflows/test-unit-fedora.yml'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-fedora:
    runs-on: ubuntu-24.04
    container:
      image: fedora:45@sha256:af8cdc432037f5e8e288bbc26c2b55b96000a911ec5b37959cd464d830f6cc5b # renovate: datasource=docker depName=fedora
    steps:
      - name: Install prerequisites
        run: |
          dnf install -y git just pipx fish gettext jq
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Setup test dependencies
        run: just test-setup
      - name: Run tests
        run: just test
