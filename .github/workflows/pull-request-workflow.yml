name: Pull Request Workflow
on: # yamllint disable-line rule:truthy
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@c05880c429c91786427337cf06853c041d1f729f # v2.7.4
    permissions:
      contents: read
      packages: read
      security-events: write
    secrets: inherit
    with:
      reusable-ci-ref: v2.7.3
      project-type: maven
      linters.devbasecheck: true
      linters.commitlint: false
      linters.licenselint: false
      linters.megalint: false
      linters.publiccodelint: false
